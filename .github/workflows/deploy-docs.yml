name: Deploy Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install mkdocs-material

      - name: Prepare docs for MkDocs
        run: |
          # Create docs directory structure
          mkdir -p docs/assets

          # Copy all markdown files into docs/
          cp *.md docs/

          # Ensure README.md is available as index.md for the home page
          cp README.md docs/index.md

          # Copy logo into docs assets
          cp aisee-logo.gif docs/assets/

          # Fix links in index.md if they used to point to a 'docs' subdirectory
          # (Keeping this as per original script's intent, though currently redundant)
          sed -i 's|\./docs/|./|g' docs/index.md
          sed -i 's|(docs/|(|g' docs/index.md

          # Fix logo reference in index.md to point to the new assets location
          sed -i 's|\./aisee-logo\.gif|./assets/aisee-logo.gif|g' docs/index.md

      - run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
